name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout (LFS pointers only)
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Enumerate LFS objects
        shell: bash
        run: git lfs ls-files --long | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Cache LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ runner.os }}-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: lfs-${{ runner.os }}-

      # The NLF-L pose model is intentionally NOT in git/LFS or this workflow. It is
      # published once (a manual, one-time user action) to the dedicated `models-v1`
      # GitHub release and downloaded by the app at first run. LFS here only carries
      # small assets (RTMDet detector, icon PNGs, alert audio), so this pull is cheap.
      - name: Pull LFS objects
        run: git lfs pull

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build installer and draft release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Slouch Tracker v__VERSION__'
          releaseDraft: true
          args: --target x86_64-pc-windows-msvc --ignore-version-mismatches

      - name: Attach SHA256SUMS.txt
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = Get-ChildItem -Path src-tauri/target -Recurse -Filter '*-setup.exe' | Select-Object -First 1
          if (-not $exe) { throw 'No NSIS *-setup.exe was produced' }
          $hash = (Get-FileHash -Algorithm SHA256 $exe.FullName).Hash.ToLower()
          $assetName = $exe.Name -replace ' ', '.'
          "$hash  $assetName" | Out-File -Encoding ascii SHA256SUMS.txt
          gh release upload ${{ github.ref_name }} SHA256SUMS.txt --clobber
